; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-div-v2]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
build_unflags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1

build_flags =
	-DUSER_SETUP_LOADED=1
	-include "${PROJECT_DIR}/include/User_Setup.h"
	-DARDUINO_USB_MODE=0
	-DARDUINO_USB_CDC_ON_BOOT=0
	-DCORE_DEBUG_LEVEL=3
	-Wl,-zmuldefs                       ; allow upstream to override ieee80211_raw_frame_sanity_check for deauth tx
lib_deps = 
	bodmer/TFT_eSPI@^2.5.43
	xreef/PCF8574 library@^2.4.0
	https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
	sui77/rc-switch@^2.6.4
	nrf24/RF24@^1.4.11
	h2zero/NimBLE-Arduino@^1.4.2
	kosme/arduinoFFT@^1.6.2
	crankyoldgit/IRremoteESP8266@^2.8.6
	adafruit/Adafruit PN532@^1.3.4
	bblanchon/ArduinoJson@^6.21.5
	https://github.com/LSatan/SmartRC-CC1101-Driver-Lib.git
lib_ldf_mode = deep+
build_src_filter = +<*>
